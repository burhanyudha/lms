<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membersihkan Cache LMS...</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8fafc; color: #334155; }
    h2 { margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>Membersihkan Cache...</h2>
  <p>Mohon tunggu sebentar, aplikasi akan dimuat ulang.</p>
  <script>
    // 1. Clear Local & Session Storage
    localStorage.clear();
    sessionStorage.clear();

    // 2. Clear Cache Storage (PWA Caches)
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (let name of names) caches.delete(name);
      });
    }

    // 3. Unregister Service Workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Redirect after a short delay to ensure cleanup is done
    setTimeout(() => {
      window.location.replace("index.html?cleared=true&t=" + new Date().getTime());
    }, 1500);
  </script>
</body>
</html>
